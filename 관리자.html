<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>도시락 발주 · 직접입력 (관리자)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍱</text></svg>">
<style>
  :root{
    --font-sans:'Pretendard','Pretendard Variable','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',system-ui,-apple-system,sans-serif;
    --bg:#FAF7F1; --surface:#FFFFFF; --surface-2:#F4EFE7; --surface-3:#EFE8DC;
    --border:#E7DFD3; --border-strong:#D8CDBC;
    --ink:#2B2621; --ink-2:#6B6259; --ink-3:#9A9084;
    --accent:#C0791C; --accent-strong:#A8681A; --accent-soft:#F6E9D3; --on-accent:#FFFFFF;
    --dosirak:#CC7A22; --sandwich:#3D6CA8; --salad:#4E9A5B;
    --dosirak-soft:#FBEEDC; --sandwich-soft:#E7EEF7; --salad-soft:#E6F1E9;
    --good:#4E9A5B; --good-soft:#E6F1E9; --warn:#C77F1B; --crit:#C24A3D;
    --shadow:0 1px 2px rgba(43,38,33,.04),0 8px 24px -12px rgba(43,38,33,.14);
    --radius:14px; --radius-sm:10px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#161410; --surface:#201E19; --surface-2:#292620; --surface-3:#332F27;
    --border:#35322B; --border-strong:#494436;
    --ink:#F2ECE1; --ink-2:#B7AE9F; --ink-3:#867D6E;
    --accent:#E0A24A; --accent-strong:#E9AE58; --accent-soft:#3A3120; --on-accent:#221B0E;
    --dosirak:#C08222; --sandwich:#5E93D4; --salad:#55A468;
    --dosirak-soft:#33291A; --sandwich-soft:#20293A; --salad-soft:#1F2E24;
    --good:#55A468; --good-soft:#1F2E24; --warn:#E0A24A; --crit:#E0685A;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.6);
  }}
  :root[data-theme="light"]{
    --bg:#FAF7F1; --surface:#FFFFFF; --surface-2:#F4EFE7; --surface-3:#EFE8DC;
    --border:#E7DFD3; --border-strong:#D8CDBC; --ink:#2B2621; --ink-2:#6B6259; --ink-3:#9A9084;
    --accent:#C0791C; --accent-strong:#A8681A; --accent-soft:#F6E9D3; --on-accent:#FFFFFF;
    --dosirak:#CC7A22; --sandwich:#3D6CA8; --salad:#4E9A5B;
    --dosirak-soft:#FBEEDC; --sandwich-soft:#E7EEF7; --salad-soft:#E6F1E9;
    --good:#4E9A5B; --good-soft:#E6F1E9; --warn:#C77F1B; --crit:#C24A3D;
    --shadow:0 1px 2px rgba(43,38,33,.04),0 8px 24px -12px rgba(43,38,33,.14);
  }
  :root[data-theme="dark"]{
    --bg:#161410; --surface:#201E19; --surface-2:#292620; --surface-3:#332F27;
    --border:#35322B; --border-strong:#494436; --ink:#F2ECE1; --ink-2:#B7AE9F; --ink-3:#867D6E;
    --accent:#E0A24A; --accent-strong:#E9AE58; --accent-soft:#3A3120; --on-accent:#221B0E;
    --dosirak:#C08222; --sandwich:#5E93D4; --salad:#55A468;
    --dosirak-soft:#33291A; --sandwich-soft:#20293A; --salad-soft:#1F2E24;
    --good:#55A468; --good-soft:#1F2E24; --warn:#E0A24A; --crit:#E0685A;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--font-sans); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums; line-height:1.5;
    min-height:100vh; min-height:100dvh;
  }
  .app{max-width:1080px;margin:0 auto;padding:clamp(14px,3vw,30px);display:flex;flex-direction:column;gap:18px}
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit}

  /* top bar */
  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .logo{width:38px;height:38px;flex:none;border-radius:10px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);display:grid;place-items:center;font-size:20px}
  .brand h1{font-size:1.12rem;font-weight:800;letter-spacing:-.02em;margin:0}
  .brand p{margin:1px 0 0;font-size:.76rem;color:var(--ink-2);font-weight:500}
  .badge{font-size:.72rem;font-weight:700;padding:5px 10px;border-radius:99px;border:1px solid var(--accent);color:var(--accent-strong);background:var(--accent-soft);white-space:nowrap}
  .tbtn{font-size:.78rem;font-weight:700;padding:7px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .tbtn:hover{color:var(--ink);border-color:var(--border-strong)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .card-h h2{margin:0;font-size:.98rem;font-weight:700;letter-spacing:-.01em}
  .card-b{padding:16px 18px}
  .muted{color:var(--ink-2)} .mut3{color:var(--ink-3)}
  .caps{font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}

  /* onboarding banner */
  .banner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:13px 16px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent-strong);font-weight:700;font-size:.88rem}
  .banner .bx{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .banner button{font-size:.8rem;font-weight:700;padding:8px 12px;border-radius:8px;border:1px solid var(--accent);background:var(--surface);color:var(--accent-strong);cursor:pointer}
  .banner button:hover{filter:brightness(1.03)}

  /* week nav */
  .weeknav{display:flex;align-items:center;gap:6px}
  .weeknav .rg{font-size:.82rem;font-weight:700;min-width:118px;text-align:center}
  .navb{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink-2);cursor:pointer;font-size:1rem;line-height:1}
  .navb:hover{color:var(--ink)}
  .smallbtn{font-size:.78rem;font-weight:700;padding:7px 12px;border-radius:8px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-2);cursor:pointer}
  .smallbtn:hover{color:var(--accent-strong)}
  .weekwarn{font-size:.74rem;font-weight:700;color:var(--warn);background:var(--accent-soft);border:1px solid var(--accent);border-radius:99px;padding:4px 10px}

  /* day flags */
  .dayflags{display:flex;gap:9px;flex-wrap:wrap}
  .dayflag{flex:1;min-width:74px;padding:11px 6px;border-radius:11px;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;text-align:center;transition:.15s}
  .dayflag .wd{font-size:1rem;font-weight:800}
  .dayflag .dt{font-size:.68rem;font-weight:600;color:var(--ink-3)}
  .dayflag.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-strong)}
  .dayflag.on .wd{color:var(--accent-strong)}
  .lastweek{margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .lastweek .lwb{font-size:.82rem;font-weight:700;padding:9px 14px;border-radius:10px;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--ink-2);cursor:pointer}
  .lastweek .lwb:hover{color:var(--accent-strong);border-color:var(--accent);background:var(--accent-soft)}
  .lastweek small{color:var(--ink-3);font-size:.75rem}

  /* layout */
  .grid2{display:grid;grid-template-columns:minmax(0,1fr);gap:18px;align-items:start}
  @media(min-width:860px){.grid2{grid-template-columns:minmax(0,1fr) 330px}}
  .col{display:flex;flex-direction:column;gap:18px;min-width:0}
  @media(min-width:860px){.col.right{position:sticky;top:16px}}

  /* quick actions + legend */
  .quick{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .quickb{font-size:.8rem;font-weight:700;padding:8px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink-2);cursor:pointer}
  .quickb:hover{border-color:var(--border-strong);color:var(--ink)}
  .quickb.prime{border-style:solid;border-color:var(--accent);background:var(--accent-soft);color:var(--accent-strong)}
  .quickb.warnb:hover{border-color:var(--crit);color:var(--crit)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:.76rem;color:var(--ink-2);font-weight:600;margin-left:auto}
  .legend .lg{display:inline-flex;align-items:center;gap:5px}
  .legend .sw{width:11px;height:11px;border-radius:4px;flex:none}
  .sw.s-dosirak{background:var(--dosirak)} .sw.s-sandwich{background:var(--sandwich)} .sw.s-salad{background:var(--salad)} .sw.s-none{background:var(--surface-3);border:1px solid var(--border-strong)}
  .sw.s-pending{background:var(--surface);border:1px dashed var(--border-strong)}

  /* entry matrix */
  .matrix-wrap{overflow-x:auto;margin-top:14px;border:1px solid var(--border);border-radius:12px}
  table.matrix{border-collapse:separate;border-spacing:0;width:100%;font-size:.86rem}
  .matrix th,.matrix td{padding:7px 8px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
  .matrix tbody tr:last-child td{border-bottom:none}
  .matrix thead th{font-size:.74rem;font-weight:800;color:var(--ink-2);background:var(--surface-3)}
  .matrix thead th .dt{display:block;font-size:.64rem;font-weight:600;color:var(--ink-3)}
  .matrix th.nmcol,.matrix td.nmcol{position:sticky;left:0;text-align:left;font-weight:700;z-index:2;min-width:96px}
  .matrix thead th.nmcol{z-index:3}
  .matrix td{background:var(--surface)}
  .matrix tbody tr:nth-child(even) td{background:var(--surface-2)}
  .matrix td.rtot{font-weight:800;color:var(--accent-strong)}
  .matrix .totcol{color:var(--ink-3);font-size:.7rem}
  .colfill{display:block;margin:4px auto 0;font-size:.64rem;font-weight:700;color:var(--ink-3);background:none;border:1px solid transparent;cursor:pointer;padding:3px 6px;border-radius:6px;min-height:26px}
  .colfill:hover{color:var(--accent-strong);background:var(--accent-soft);border-color:var(--accent)}
  .mcell{width:100%;min-width:74px;font-size:.82rem;font-weight:700;padding:9px 6px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:.1s;background:var(--surface-3);color:var(--ink-2)}
  .mcell:hover{filter:brightness(1.04);transform:translateY(-1px)}
  .mcell.m-dosirak{background:var(--dosirak);color:#fff;border-color:var(--dosirak)}
  .mcell.m-sandwich{background:var(--sandwich);color:#fff;border-color:var(--sandwich)}
  .mcell.m-salad{background:var(--salad);color:#fff;border-color:var(--salad)}
  .mcell.m-none{background:var(--surface-3);color:var(--ink-2);border-color:var(--border-strong)}
  .mcell.m-pending{background:var(--surface);color:var(--ink-3);border-style:dashed;border-color:var(--border-strong)}
  .rowfill{border:none;background:none;color:var(--ink-3);cursor:pointer;font-size:.72rem;font-weight:700;padding:2px 6px;border-radius:6px}
  .rowfill:hover{color:var(--warn);background:var(--accent-soft)}
  .delp{border:none;background:none;color:var(--ink-3);cursor:pointer;font-size:.95rem;padding:0 2px;margin-left:2px}
  .delp:hover{color:var(--crit)}
  .addp{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .addp input{font-family:inherit;font-size:.86rem;color:var(--ink);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
  .addp button{font-size:.82rem;font-weight:700;color:var(--accent-strong);background:none;border:1px dashed var(--border-strong);border-radius:8px;padding:9px 14px;cursor:pointer}
  .addp button:hover{background:var(--accent-soft);border-style:solid;border-color:var(--accent)}
  .notyet{text-align:center;padding:34px 18px;color:var(--ink-2)}
  .notyet .em{font-size:2rem}
  .counter{font-size:.82rem;font-weight:700;color:var(--ink-2)}
  .counter b{color:var(--good)} .counter .cwarn{color:var(--warn)}

  /* selection popover */
  .pop{position:fixed;z-index:80;min-width:168px;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;box-shadow:var(--shadow);padding:6px;display:none;flex-direction:column;gap:2px}
  .pop.show{display:flex}
  .pop .ph{font-size:.68rem;font-weight:700;color:var(--ink-3);padding:5px 9px 3px;letter-spacing:.02em}
  .pop .opt{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:8px;border:none;background:none;color:var(--ink);font-size:.9rem;font-weight:700;cursor:pointer;text-align:left;width:100%}
  .pop .opt:hover{background:var(--surface-2)}
  .pop .opt .sw{width:13px;height:13px;border-radius:4px;flex:none}
  .pop .opt .ck{margin-left:auto;color:var(--accent-strong);font-weight:800}
  .pop .opt.clear{color:var(--ink-3);border-top:1px solid var(--border);border-radius:0 0 8px 8px;margin-top:3px;padding-top:11px;font-size:.82rem}

  /* result */
  .bigtot{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:2px 2px 14px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .bigtot .v{font-size:1.7rem;font-weight:800;letter-spacing:-.02em;color:var(--accent-strong)}
  .bigtot .l{font-size:.78rem;font-weight:700;color:var(--ink-3)}
  .pendwarn{margin:-2px 0 12px;padding:10px 12px;border-radius:10px;background:var(--accent-soft);border:1px solid var(--accent);color:var(--warn);font-size:.8rem;font-weight:700;line-height:1.5}
  .oline{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--border);flex-wrap:wrap}
  .oline:last-child{border-bottom:none}
  .oline .od{font-weight:800;min-width:70px;font-size:.9rem}
  .oline .oc{display:flex;gap:10px;flex-wrap:wrap;flex:1;font-size:.82rem;color:var(--ink-2);font-weight:600}
  .oline .oc b{color:var(--ink)}
  .oline .oc .pend{color:var(--warn)}
  .oline .oa{font-weight:800;white-space:nowrap;font-size:.85rem}
  .dot{width:9px;height:9px;border-radius:3px;flex:none;display:inline-block;margin-right:4px}
  .d-dosirak{background:var(--dosirak)} .d-sandwich{background:var(--sandwich)} .d-salad{background:var(--salad)} .d-none{background:var(--ink-3)}
  .copybtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:16px;background:var(--accent-strong);color:var(--on-accent);border:none;border-radius:12px;padding:14px 16px;font-size:.98rem;font-weight:800;cursor:pointer;box-shadow:var(--shadow)}
  .copybtn:hover{filter:brightness(1.06)}
  .copybtn:active{transform:translateY(1px)}
  .copybtn:disabled{opacity:.5;cursor:default;filter:none}

  /* mobile sticky summary bar */
  .mbar{display:none}
  @media(max-width:859px){
    .mbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:55;align-items:center;gap:12px;
      padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -6px 20px -12px rgba(0,0,0,.3)}
    .mbar .mt{display:flex;flex-direction:column;line-height:1.2}
    .mbar .mt b{font-size:1.05rem;color:var(--accent-strong)}
    .mbar .mt small{font-size:.68rem;color:var(--ink-3);font-weight:700}
    .mbar .mcopy{margin-left:auto;background:var(--accent-strong);color:var(--on-accent);border:none;border-radius:10px;padding:11px 16px;font-size:.86rem;font-weight:800;cursor:pointer}
    .app{padding-bottom:78px}
  }

  /* settings */
  details.set{margin-top:2px}
  details.set>summary{cursor:pointer;font-size:.86rem;font-weight:700;color:var(--ink-2);list-style:none;padding:6px 0}
  details.set>summary::-webkit-details-marker{display:none}
  .set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:12px}
  .set-block h3{margin:0 0 9px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3)}
  .frow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .frow input{font-family:inherit;font-size:.86rem;color:var(--ink);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;width:100%}
  .frow .pill{font-size:.78rem;font-weight:700;color:var(--ink-2);min-width:58px}
  .frow .sw{width:12px;height:12px;border-radius:4px;flex:none}
  .hint{font-size:.75rem;color:var(--ink-3);margin:8px 0 0;line-height:1.5}

  /* drag reorder + budget */
  .frow.prow{align-items:center}
  .frow.prow input{flex:1;min-width:0;width:auto}
  .drag{cursor:grab;color:var(--ink-3);font-size:1.05rem;line-height:1;user-select:none;flex:none;padding:0 2px}
  .drag:active{cursor:grabbing}
  .prow.dragover{outline:2px dashed var(--accent);outline-offset:2px;border-radius:8px}
  .prow.dragging{opacity:.45}
  .ord{flex:none;border:1px solid var(--border);background:var(--surface);color:var(--ink-3);border-radius:6px;width:26px;height:30px;cursor:pointer;font-size:.8rem;line-height:1}
  .ord:hover:not(:disabled){color:var(--accent-strong);border-color:var(--accent)}
  .ord:disabled{opacity:.3;cursor:default}
  .meter{height:10px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin:10px 0 8px}
  .meter>i{display:block;height:100%;border-radius:99px;transition:width .35s}
  .bud-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .bud-l{font-size:.72rem;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
  .bud-remain{font-size:1.55rem;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-top:4px}
  .bud-sub{font-size:.78rem;color:var(--ink-2);font-weight:600}
  .bud-over{margin-top:8px;font-size:.78rem;font-weight:700;color:var(--crit)}

  /* manual-copy sheet */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;padding:20px;z-index:95}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);max-width:460px;width:100%;padding:18px}
  .sheet h3{margin:0 0 6px;font-size:1rem}
  .sheet p{margin:0 0 10px;font-size:.84rem;color:var(--ink-2)}
  .sheet textarea{width:100%;height:170px;font-family:inherit;font-size:.85rem;color:var(--ink);background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px;resize:vertical;line-height:1.6}
  .sheet .row{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
  .sheet .row button{font-size:.85rem;font-weight:700;padding:9px 16px;border-radius:9px;cursor:pointer;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--ink-2)}
  .sheet .row button.pri{border:none;background:var(--accent-strong);color:var(--on-accent)}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .foot{text-align:center;font-size:.74rem;color:var(--ink-3);padding:2px 0 10px;line-height:1.7}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-size:.85rem;font-weight:700;padding:11px 20px;border-radius:99px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:100;display:flex;align-items:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  @media(max-width:859px){.toast{bottom:84px}}
  .toast .undo{margin-left:14px;background:none;border:none;color:var(--accent-strong);font-weight:800;cursor:pointer;font-size:.85rem;text-decoration:underline;padding:0}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="brand">
      <div class="logo">🍱</div>
      <div>
        <h1>도시락 발주 · 직접입력</h1>
        <p id="barsub">관리자가 직접 물어보고 입력 · 결과 바로 복사</p>
      </div>
    </div>
    <span class="badge">✍️ 직접 입력 모드</span>
    <button class="tbtn" id="themeBtn" title="테마" aria-label="테마 전환">◐</button>
  </header>
  <main id="main"></main>
  <p class="foot" id="foot"></p>
</div>
<div class="mbar" id="mbar" hidden></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var LS="dosirakAdmin.";
  var DAYS=[["mon","월"],["tue","화"],["wed","수"],["thu","목"],["fri","금"]];
  var MENUCOLOR={dosirak:"var(--dosirak)",sandwich:"var(--sandwich)",salad:"var(--salad)",none:"var(--ink-3)"};
  var MENUS=["dosirak","sandwich","salad","none"];

  /* ---- state ---- */
  var CFG=null, WEEK=null, DAYSM={}, CHOICES={};
  var ONB=false, SETOPEN=false, undoSnap=null, dragSrc=null;
  var R={}; // 부분 갱신용 엘리먼트 참조

  /* ---- utils ---- */
  var $=function(id){return document.getElementById(id);};
  function el(t,p){var n=document.createElement(t);p=p||{};for(var k in p){var v=p[k];
    if(k==="class")n.className=v;else if(k==="text")n.textContent=v;else if(k==="html")n.innerHTML=v;
    else if(k.slice(0,2)==="on"&&typeof v==="function")n.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!==null&&v!==undefined&&v!==false)n.setAttribute(k,v===true?"":v);}
    for(var i=2;i<arguments.length;i++)add(n,arguments[i]);return n;}
  function add(n,c){if(c==null||c===false)return;if(Array.isArray(c)){c.forEach(function(x){add(n,x);});return;}
    n.appendChild(c.nodeType?c:document.createTextNode(String(c)));}
  function clone(o){return JSON.parse(JSON.stringify(o));}
  var won=function(n){return new Intl.NumberFormat("ko-KR").format(Math.round(n))+"원";};
  function pad(n){return(n<10?"0":"")+n;}
  function fmtKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function parseKey(k){var a=k.split("-");return new Date(+a[0],+a[1]-1,+a[2]);}
  function mondayKey(d){var x=new Date(d.getFullYear(),d.getMonth(),d.getDate());var wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);return fmtKey(x);}
  function shift(k,n){var d=parseKey(k);d.setDate(d.getDate()+n);return fmtKey(d);}
  function dayDate(week,i){var d=parseKey(week);d.setDate(d.getDate()+i);return d;}
  function weekRange(week){var a=dayDate(week,0),b=dayDate(week,4);return (a.getMonth()+1)+"/"+a.getDate()+"–"+((a.getMonth()!==b.getMonth()?(b.getMonth()+1)+"/":""))+b.getDate();}
  function isThisWeek(){return WEEK===mondayKey(new Date());}

  function defaultCfg(){
    var names=["김서준","이지우","박도윤","최하은","정예은","강시우","윤지호"];
    return {people:names.map(function(n,i){return{id:"p"+(i+1),name:n};}),
      menus:[{id:"dosirak",label:"4첩 도시락",price:7500},{id:"sandwich",label:"샌드위치",price:6000},{id:"salad",label:"샐러드",price:7000}],
      budget:{amount:540000,period:"month"}, seq:8};
  }
  function menu(id){for(var i=0;i<CFG.menus.length;i++)if(CFG.menus[i].id===id)return CFG.menus[i];return null;}
  function price(id){if(!id||id==="none")return 0;var m=menu(id);return m?m.price:0;}
  function menuLabel(id){if(id==="none")return "안 먹음";var m=menu(id);return m?m.label:id;}
  function shortLabel(id){return id==="none"?"안먹음":id==="dosirak"?"도시락":id==="sandwich"?"샌드위치":id==="salad"?"샐러드":id;}
  function cellText(v){return v==null?"미정":shortLabel(v);}

  /* ---- storage (완전 독립 · localStorage 전용) ---- */
  function load(){
    try{CFG=JSON.parse(localStorage.getItem(LS+"config"));}catch(e){}
    if(!CFG||!CFG.people)CFG=defaultCfg();
    if(!CFG.budget)CFG.budget={amount:540000,period:"month"};
    try{DAYSM=JSON.parse(localStorage.getItem(LS+"days."+WEEK))||{};}catch(e){DAYSM={};}
    if(!DAYSM||typeof DAYSM!=="object")DAYSM={};
    try{CHOICES=JSON.parse(localStorage.getItem(LS+"choices."+WEEK))||{};}catch(e){CHOICES={};}
    if(!CHOICES||typeof CHOICES!=="object")CHOICES={};
  }
  function saveCfg(){try{localStorage.setItem(LS+"config",JSON.stringify(CFG));}catch(e){}}
  function saveDays(){try{localStorage.setItem(LS+"days."+WEEK,JSON.stringify(DAYSM));}catch(e){}}
  function saveChoices(){try{localStorage.setItem(LS+"choices."+WEEK,JSON.stringify(CHOICES));}catch(e){}}
  function saveAll(){saveCfg();saveDays();saveChoices();}

  /* ---- computed ---- */
  function activeDays(){return DAYS.filter(function(D){return DAYSM[D[0]];});}
  function hasActive(){return activeDays().length>0;}
  function getPick(pid,dk){var r=CHOICES[pid];return(r&&r[dk]!=null)?r[dk]:null;} // null = 미입력
  function setPick(pid,dk,val){
    if(val==null){if(CHOICES[pid])delete CHOICES[pid][dk];}
    else{CHOICES[pid]=CHOICES[pid]||{};CHOICES[pid][dk]=val;}
    saveChoices();
  }
  function dayAgg(dk){var c={dosirak:0,sandwich:0,salad:0,none:0,eat:0,total:0,pending:0};
    CFG.people.forEach(function(p){var v=getPick(p.id,dk);
      if(v==null){c.pending++;}else if(v==="none"){c.none++;}else{c[v]=(c[v]||0)+1;c.eat++;c.total+=price(v);}});return c;}
  function personTotal(pid){var t=0;activeDays().forEach(function(D){var v=getPick(pid,D[0]);if(v&&v!=="none")t+=price(v);});return t;}
  function personPending(pid){var n=0;activeDays().forEach(function(D){if(getPick(pid,D[0])==null)n++;});return n;}
  function weekTotal(){var t=0;activeDays().forEach(function(D){t+=dayAgg(D[0]).total;});return t;}
  function weekMeals(){var n=0;activeDays().forEach(function(D){n+=dayAgg(D[0]).eat;});return n;}
  function pendingPeople(){return CFG.people.filter(function(p){return personPending(p.id)>0;});}
  function pendingCells(){var n=0;CFG.people.forEach(function(p){n+=personPending(p.id);});return n;}

  /* =========================================================
     전체 렌더 (구조 변경 시에만) — 셀 입력은 부분 갱신 사용
     ========================================================= */
  function render(){
    var oldWrap=document.querySelector(".matrix-wrap");
    var sc=oldWrap?oldWrap.scrollLeft:0;
    R={cells:{},rtot:{},name:{}};
    var m=$("main"); m.innerHTML="";
    if(ONB)m.appendChild(renderBanner());
    m.appendChild(renderDays());
    var g=el("div",{class:"grid2"});
    var left=el("div",{class:"col"});
    left.appendChild(renderEntry());
    left.appendChild(renderSettings());
    var right=el("div",{class:"col right"});
    right.appendChild(renderBudget());
    right.appendChild(renderResult());
    g.appendChild(left); g.appendChild(right);
    m.appendChild(g);
    if(R.matrixWrap)R.matrixWrap.scrollLeft=sc;
    refreshSummary(); refreshCounter(); refreshMobileBar();
    $("foot").innerHTML="💾 이 브라우저에만 저장돼요 (완전 독립 · 공유 앱과 별개) · 매주 여기서 직접 입력하고 결과를 복사해 사장님께 전달하세요.";
  }

  function renderBanner(){
    return el("div",{class:"banner"},
      el("span",{},"🎬 처음이시죠? 아래 인원 이름과 메뉴 가격을 우리 팀 실제 값으로 먼저 바꿔주세요."),
      el("div",{class:"bx"},
        el("button",{onclick:function(){SETOPEN=true;render();setTimeout(function(){var d=document.querySelector("details.set");if(d)d.scrollIntoView({behavior:"smooth",block:"center"});},30);}},"인원·가격 설정 열기"),
        el("button",{onclick:dismissOnb},"닫기")));
  }
  function dismissOnb(){ONB=false;try{localStorage.setItem(LS+"onboarded","1");}catch(e){}render();}

  function renderDays(){
    var card=el("div",{class:"card"});
    var h=el("div",{class:"card-h"});
    h.appendChild(el("h2",{},"주문일 정하기"));
    var nav=el("div",{class:"weeknav"});
    if(!isThisWeek())nav.appendChild(el("span",{class:"weekwarn"},"이번 주 아님"));
    nav.appendChild(el("button",{class:"smallbtn",onclick:function(){WEEK=mondayKey(new Date());load();render();}},"이번 주"));
    nav.appendChild(el("button",{class:"navb","aria-label":"이전 주",onclick:function(){go(-1);}},"‹"));
    nav.appendChild(el("span",{class:"rg num"},weekRange(WEEK)+" 주"));
    nav.appendChild(el("button",{class:"navb","aria-label":"다음 주",onclick:function(){go(1);}},"›"));
    h.appendChild(nav);
    card.appendChild(h);
    var b=el("div",{class:"card-b"});
    b.appendChild(el("div",{class:"caps",style:"margin-bottom:9px"},"이번 주 도시락 시키는 요일 (누르면 켜고 끔)"));
    var flags=el("div",{class:"dayflags"});
    DAYS.forEach(function(D,i){var d=dayDate(WEEK,i);
      flags.appendChild(el("button",{class:"dayflag"+(DAYSM[D[0]]?" on":""),onclick:function(){
        DAYSM[D[0]]=!DAYSM[D[0]];saveDays();render();
      }}, el("div",{class:"wd"},D[1]), el("div",{class:"dt num"},(d.getMonth()+1)+"/"+d.getDate())));
    });
    b.appendChild(flags);
    var lw=el("div",{class:"lastweek"});
    lw.appendChild(el("button",{class:"lwb",onclick:copyLastWeek},"📋 지난주와 동일하게 채우기"));
    lw.appendChild(el("small",{},"지난주 요일·메뉴를 이번 주로 복사해요"));
    b.appendChild(lw);
    card.appendChild(b);
    return card;
  }

  function go(n){WEEK=shift(WEEK,n*7);load();render();}

  function renderEntry(){
    var card=el("div",{class:"card"});
    var h=el("div",{class:"card-h"});
    h.appendChild(el("h2",{},"메뉴 직접 입력"));
    R.counterEl=el("div",{class:"counter"});
    h.appendChild(R.counterEl);
    card.appendChild(h);
    var b=el("div",{class:"card-b"});
    if(!hasActive()){
      b.appendChild(el("div",{class:"notyet"},el("div",{class:"em"},"🗓️"),
        el("p",{},"위에서 이번 주 주문일을 먼저 켜주세요."),
        el("p",{class:"mut3",style:"font-size:.82rem"},"요일을 켜면 아래에 사람별 메뉴표가 나와요.")));
      card.appendChild(b); return card;
    }
    // quick + legend
    var q=el("div",{class:"quick"});
    q.appendChild(el("button",{class:"quickb prime",onclick:function(){fillAll("dosirak","모두 도시락으로 바꿨어요");}},"🍱 모두 도시락"));
    q.appendChild(el("button",{class:"quickb",onclick:function(){fillAll("none","모두 안먹음으로 바꿨어요");}},"모두 안먹음"));
    q.appendChild(el("button",{class:"quickb warnb",onclick:function(){fillAll(null,"모두 미입력으로 지웠어요");}},"모두 지우기"));
    var leg=el("div",{class:"legend"});
    [["dosirak","도시락"],["sandwich","샌드위치"],["salad","샐러드"],["none","안먹음"],["pending","미정"]].forEach(function(o){
      leg.appendChild(el("span",{class:"lg"},el("i",{class:"sw s-"+o[0]}),o[1]));});
    q.appendChild(leg);
    b.appendChild(q);
    b.appendChild(el("p",{class:"hint"},"칸을 누르면 메뉴를 바로 고를 수 있어요. 아직 안 물어본 칸은 “미정”(점선)으로 두면 주문에서 빠집니다."));

    // matrix
    var act=activeDays();
    var wrap=el("div",{class:"matrix-wrap"}); R.matrixWrap=wrap;
    var tbl=el("table",{class:"matrix"});
    var thead=el("thead"); var hr=el("tr");
    hr.appendChild(el("th",{class:"nmcol"},"이름"));
    act.forEach(function(D){var i=DAYS.indexOf(D);var d=dayDate(WEEK,i);var dk=D[0];
      hr.appendChild(el("th",{},D[1],el("span",{class:"dt num"},(d.getMonth()+1)+"/"+d.getDate()),
        el("button",{class:"colfill",title:D[1]+"요일 전원 도시락",onclick:function(){fillCol(dk,"dosirak",D[1]+"요일 전원 도시락");}},"이 요일 도시락")));
    });
    hr.appendChild(el("th",{class:"totcol"},"합계"));
    thead.appendChild(hr); tbl.appendChild(thead);
    var tb=el("tbody");
    CFG.people.forEach(function(p,pi){
      var tr=el("tr");
      var nm=el("td",{class:"nmcol"});
      var nmText=el("span",{},p.name); R.name[p.id]=nmText; nm.appendChild(nmText);
      nm.appendChild(el("button",{class:"rowfill",title:"이 사람 이번주 전체 안먹음",onclick:function(){fillRow(p.id,"none",p.name+" 전체 안먹음");}},"안먹음"));
      if(CFG.people.length>1)nm.appendChild(el("button",{class:"delp",title:"삭제",onclick:function(){deletePerson(pi);}},"×"));
      tr.appendChild(nm);
      R.cells[p.id]={};
      act.forEach(function(D){var dk=D[0];var v=getPick(p.id,dk);
        var cell=el("td");
        var btn=el("button",{class:"mcell m-"+(v==null?"pending":v),onclick:function(){openPopover(p.id,dk,btn);}}, cellText(v));
        R.cells[p.id][dk]=btn;
        cell.appendChild(btn); tr.appendChild(cell);
      });
      tr.appendChild(el("td",{class:"rtot num"},won(personTotal(p.id))));
      R.rtot[p.id]=tr.lastChild;
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
    wrap.appendChild(tbl); b.appendChild(wrap);

    // add person inline
    var addRow=el("div",{class:"addp"});
    var inp=el("input",{type:"text",placeholder:"이름 추가…","aria-label":"이름 추가"});
    function addP(){var v=(inp.value||"").trim();if(!v)return;CFG.people.push({id:"p"+(CFG.seq++),name:v});saveCfg();markTouched();render();setTimeout(function(){var ni=document.querySelector(".addp input");if(ni)ni.focus();},20);}
    inp.addEventListener("keydown",function(e){if(e.key==="Enter")addP();});
    addRow.appendChild(inp);
    addRow.appendChild(el("button",{onclick:addP},"+ 추가"));
    b.appendChild(addRow);

    card.appendChild(b);
    return card;
  }

  /* ---- 부분 갱신 ---- */
  function paintCell(pid,dk){var mm=R.cells[pid];if(!mm)return;var b=mm[dk];if(!b)return;
    var v=getPick(pid,dk);b.className="mcell m-"+(v==null?"pending":v);b.textContent=cellText(v);}
  function updateRowTotal(pid){if(R.rtot[pid])R.rtot[pid].textContent=won(personTotal(pid));}
  function applyPick(pid,dk,val){setPick(pid,dk,val);paintCell(pid,dk);updateRowTotal(pid);refreshSummary();refreshCounter();refreshMobileBar();}

  function refreshCounter(){
    if(!R.counterEl)return;
    var tot=CFG.people.length,done=0;
    CFG.people.forEach(function(p){if(personPending(p.id)===0)done++;});
    R.counterEl.innerHTML="";
    R.counterEl.appendChild(el("span",{},"입력 완료 "));
    R.counterEl.appendChild(el("b",{},done+"/"+tot+"명"));
    var pend=tot-done;
    if(pend>0)R.counterEl.appendChild(el("span",{class:"cwarn"}," · 미입력 "+pend+"명"));
  }

  function fillAll(val,msg){pushUndo(msg);
    activeDays().forEach(function(D){CFG.people.forEach(function(p){setPick(p.id,D[0],val);});});
    CFG.people.forEach(function(p){activeDays().forEach(function(D){paintCell(p.id,D[0]);});updateRowTotal(p.id);});
    refreshSummary();refreshCounter();refreshMobileBar();}
  function fillCol(dk,val,msg){pushUndo(msg);
    CFG.people.forEach(function(p){setPick(p.id,dk,val);paintCell(p.id,dk);updateRowTotal(p.id);});
    refreshSummary();refreshCounter();refreshMobileBar();}
  function fillRow(pid,val,msg){pushUndo(msg);
    activeDays().forEach(function(D){setPick(pid,D[0],val);paintCell(pid,D[0]);});updateRowTotal(pid);
    refreshSummary();refreshCounter();refreshMobileBar();}

  function deletePerson(i){var p=CFG.people[i];pushUndo("‘"+p.name+"’ 삭제됨");
    CFG.people.splice(i,1);if(CHOICES[p.id])delete CHOICES[p.id];saveCfg();saveChoices();render();}
  function moveP(i,dir){var j=i+dir;if(j<0||j>=CFG.people.length)return;var a=CFG.people,t=a[i];a[i]=a[j];a[j]=t;saveCfg();markTouched();render();}

  /* ---- 실행취소(1단계) ---- */
  function pushUndo(msg){undoSnap={choices:clone(CHOICES),people:clone(CFG.people),days:clone(DAYSM),seq:CFG.seq};toast(msg||"변경됨",doUndo);}
  function doUndo(){if(!undoSnap)return;CHOICES=undoSnap.choices;CFG.people=undoSnap.people;CFG.seq=undoSnap.seq;DAYSM=undoSnap.days;undoSnap=null;saveAll();render();toast("되돌렸어요");}

  function copyLastWeek(){
    var prev=shift(WEEK,-7),pd=null,pc=null;
    try{pd=JSON.parse(localStorage.getItem(LS+"days."+prev));}catch(e){}
    try{pc=JSON.parse(localStorage.getItem(LS+"choices."+prev));}catch(e){}
    var hasDays=pd&&Object.keys(pd).some(function(k){return pd[k];});
    var hasCh=pc&&Object.keys(pc).length;
    if(!hasDays&&!hasCh){toast("지난주 기록이 없어요");return;}
    pushUndo("지난주와 동일하게 채웠어요");
    DAYSM=pd?clone(pd):{};CHOICES=pc?clone(pc):{};saveDays();saveChoices();render();
  }

  /* ---- 선택 팝오버 ---- */
  var pop=el("div",{class:"pop"}),popOpen=false,popAnchor=null;
  document.body.appendChild(pop);
  function closePop(){popOpen=false;popAnchor=null;pop.classList.remove("show");}
  function openPopover(pid,dk,anchor){
    if(popOpen&&popAnchor===anchor){closePop();return;}
    popAnchor=anchor;popOpen=true;
    var cur=getPick(pid,dk);
    pop.innerHTML="";
    pop.appendChild(el("div",{class:"ph"},"메뉴 선택"));
    MENUS.forEach(function(id){
      pop.appendChild(el("button",{class:"opt",onclick:function(){applyPick(pid,dk,id);closePop();try{anchor.focus();}catch(e){}}},
        el("i",{class:"sw",style:"background:"+MENUCOLOR[id]+(id==="none"?";border:1px solid var(--border-strong)":"")}),
        menuLabel(id), cur===id?el("span",{class:"ck"},"✓"):null));
    });
    if(cur!=null)pop.appendChild(el("button",{class:"opt clear",onclick:function(){applyPick(pid,dk,null);closePop();try{anchor.focus();}catch(e){}}},"↺ 미입력으로 지우기"));
    pop.classList.add("show");
    var r=anchor.getBoundingClientRect(),pw=pop.offsetWidth,ph=pop.offsetHeight;
    var left=Math.max(8,Math.min(r.left,window.innerWidth-pw-8));
    var top=r.bottom+4; if(top+ph>window.innerHeight-8)top=Math.max(8,r.top-ph-4);
    pop.style.left=left+"px";pop.style.top=top+"px";
  }
  document.addEventListener("click",function(e){if(!popOpen)return;if(pop.contains(e.target))return;if(popAnchor&&popAnchor.contains(e.target))return;closePop();},true);
  document.addEventListener("keydown",function(e){if(e.key==="Escape"&&popOpen)closePop();});
  window.addEventListener("scroll",function(){if(popOpen)closePop();},true);
  window.addEventListener("resize",function(){if(popOpen)closePop();});

  /* ---- 이 달 예산 ---- */
  function renderBudget(){
    var card=el("div",{class:"card"});
    R.budgetHead=el("h2",{},"이 달 예산");
    card.appendChild(el("div",{class:"card-h"},R.budgetHead));
    R.budgetHost=el("div",{class:"card-b"});
    card.appendChild(R.budgetHost);
    return card;
  }
  // 이번 달(보고 있는 주가 속한 달)의 모든 주를 localStorage에서 합산
  function monthTotal(){
    var ref=dayDate(WEEK,3), y=ref.getFullYear(), m=ref.getMonth();
    var last=new Date(y,m+1,0), mk=mondayKey(new Date(y,m,1)), total=0, guard=0;
    while(parseKey(mk)<=last && guard<8){
      var days=null, ppl=null;
      try{days=JSON.parse(localStorage.getItem(LS+"days."+mk));}catch(e){}
      try{ppl=JSON.parse(localStorage.getItem(LS+"choices."+mk));}catch(e){}
      days=days||{}; ppl=ppl||{};
      DAYS.forEach(function(D,i){ if(!days[D[0]])return; var dd=dayDate(mk,i); if(dd.getMonth()!==m)return;
        for(var pid in ppl){var r=ppl[pid]; var v=r?r[D[0]]:null; if(v&&v!=="none")total+=price(v);}
      });
      mk=shift(mk,7); guard++;
    }
    return total;
  }
  function refreshBudget(){
    var host=R.budgetHost; if(!host)return;
    var ref=dayDate(WEEK,3), m=ref.getMonth();
    var cap=(CFG.budget&&CFG.budget.amount)||0, used=monthTotal();
    var remain=cap-used, ratio=cap>0?used/cap:0;
    if(R.budgetHead)R.budgetHead.textContent="이 달 예산 · "+(m+1)+"월";
    host.innerHTML="";
    host.appendChild(el("div",{class:"bud-top"},
      el("span",{class:"bud-l"},"남은 금액"),
      el("span",{class:"bud-l num"},(cap>0?Math.round(ratio*100):0)+"% 사용")));
    var rem=el("div",{class:"bud-remain num"},won(remain));
    rem.style.color=remain<0?"var(--crit)":"var(--ink)";
    host.appendChild(rem);
    var meter=el("div",{class:"meter"}), fill=el("i");
    fill.style.width=Math.min(100,ratio*100)+"%";
    fill.style.background=ratio>=1?"var(--crit)":ratio>=.75?"var(--warn)":"var(--good)";
    meter.appendChild(fill); host.appendChild(meter);
    host.appendChild(el("div",{class:"bud-sub num"},won(used)+" / "+won(cap)+" 사용"));
    if(remain<0)host.appendChild(el("div",{class:"bud-over"},"⚠️ 예산을 "+won(-remain)+" 초과했어요"));
  }

  /* ---- 결과(발주 요약) ---- */
  function renderResult(){
    var card=el("div",{class:"card"});
    card.appendChild(el("div",{class:"card-h"},el("h2",{},"발주 요약")));
    R.summaryHost=el("div",{class:"card-b"});
    card.appendChild(R.summaryHost);
    return card;
  }
  function refreshSummary(){
    refreshBudget();
    var b=R.summaryHost; if(!b)return; b.innerHTML="";
    if(!hasActive()){b.appendChild(el("div",{class:"mut3",style:"padding:8px 0"},"주문일을 켜면 결과가 여기 나와요."));return;}
    b.appendChild(el("div",{class:"bigtot"},
      el("div",{},el("div",{class:"l"},"이번 주 합계"),el("div",{class:"v num"},won(weekTotal()))),
      el("div",{class:"l num",style:"text-align:right"},"총 "+weekMeals()+"끼")));
    var pend=pendingPeople();
    if(pend.length){
      var names=pend.map(function(p){return p.name;});
      var shown=names.slice(0,6).join(", ")+(names.length>6?" 외 "+(names.length-6)+"명":"");
      b.appendChild(el("div",{class:"pendwarn"},"⚠️ 아직 미입력 "+pend.length+"명 — 주문에서 빠져요 ("+shown+")"));
    }
    activeDays().forEach(function(D){var i=DAYS.indexOf(D);var c=dayAgg(D[0]);var d=dayDate(WEEK,i);
      var line=el("div",{class:"oline"});
      line.appendChild(el("div",{class:"od num"},(d.getMonth()+1)+"/"+d.getDate()+"("+D[1]+")"));
      var cc=el("div",{class:"oc"});
      [["dosirak","도시락"],["sandwich","샌드위치"],["salad","샐러드"]].forEach(function(mm){
        if(c[mm[0]]>0)cc.appendChild(el("span",{},el("i",{class:"dot d-"+mm[0]}),mm[1]+" ",el("b",{},c[mm[0]]+"개")));});
      if(c.none>0)cc.appendChild(el("span",{class:"mut3"},"안먹음 "+c.none));
      if(c.pending>0)cc.appendChild(el("span",{class:"pend"},"미입력 "+c.pending));
      if(c.eat===0&&c.none===0&&c.pending===0)cc.appendChild(el("span",{class:"mut3"},"—"));
      line.appendChild(cc);
      line.appendChild(el("div",{class:"oa num"},c.eat+"명 · "+won(c.total)));
      b.appendChild(line);
    });
    b.appendChild(el("button",{class:"copybtn",onclick:copyOrder},"📋 사장님께 보낼 주문 복사"));
  }

  function refreshMobileBar(){
    var bar=$("mbar");
    if(!hasActive()){bar.hidden=true;bar.innerHTML="";return;}
    bar.hidden=false;bar.innerHTML="";
    var pend=pendingCells();
    bar.appendChild(el("div",{class:"mt"},el("b",{class:"num"},won(weekTotal())),
      el("small",{},"총 "+weekMeals()+"끼"+(pend>0?" · 미입력 "+pend:""))));
    bar.appendChild(el("button",{class:"mcopy",onclick:copyOrder},"📋 복사"));
  }

  function buildOrderText(){
    var lines=["[도시락 주문] "+weekRange(WEEK)+" 주"],wk=0;
    activeDays().forEach(function(D){var i=DAYS.indexOf(D);var c=dayAgg(D[0]);var d=dayDate(WEEK,i);wk+=c.total;
      var parts=[];if(c.dosirak)parts.push("도시락 "+c.dosirak);if(c.sandwich)parts.push("샌드위치 "+c.sandwich);if(c.salad)parts.push("샐러드 "+c.salad);
      lines.push((d.getMonth()+1)+"/"+d.getDate()+"("+D[1]+") — "+(parts.length?parts.join(", "):"주문 없음")+"  ("+c.eat+"명, "+won(c.total)+")");});
    lines.push("──────────","주간 합계: "+won(wk));
    return lines.join("\n");
  }
  function copyOrder(){
    if(popOpen)closePop();
    var pc=pendingCells();
    if(pc>0){
      var names=pendingPeople().map(function(p){return p.name;}).join(", ");
      if(!window.confirm("아직 미입력이 "+pc+"칸 있어요 ("+names+").\n미입력은 주문에서 빠집니다. 그래도 복사할까요?"))return;
    }
    var txt=buildOrderText();
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){toast("주문을 복사했어요 📋");},function(){legacyCopy(txt);});
    }else legacyCopy(txt);
  }
  function legacyCopy(txt){
    var ok=false;
    try{var ta=el("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();ok=document.execCommand("copy");document.body.removeChild(ta);}catch(e){ok=false;}
    if(ok)toast("주문을 복사했어요 📋");else showManualCopy(txt);
  }
  function showManualCopy(txt){
    var ta;
    var ov=el("div",{class:"overlay",onclick:function(e){if(e.target===ov)document.body.removeChild(ov);}});
    var sheet=el("div",{class:"sheet"},
      el("h3",{},"주문 텍스트 직접 복사"),
      el("p",{},"자동 복사가 막혀 있어요 (파일을 직접 열면 종종 그래요). 아래 내용을 전체 선택해 복사하세요."),
      (ta=el("textarea",{readonly:true},txt)),
      el("div",{class:"row"},
        el("button",{onclick:function(){document.body.removeChild(ov);}},"닫기"),
        el("button",{class:"pri",onclick:function(){ta.focus();ta.select();try{document.execCommand("copy");}catch(e){}toast("복사 시도했어요");}},"전체 선택 후 복사")));
    ov.appendChild(sheet);document.body.appendChild(ov);
    setTimeout(function(){ta.focus();ta.select();},30);
  }

  function markTouched(){if(ONB){ONB=false;try{localStorage.setItem(LS+"onboarded","1");}catch(e){}}}

  function renderSettings(){
    var d=el("details",{class:"set"}); if(SETOPEN)d.setAttribute("open","");
    d.addEventListener("toggle",function(){SETOPEN=d.open;});
    d.appendChild(el("summary",{},"⚙️ 인원 · 메뉴 가격 설정"));
    var grid=el("div",{class:"set-grid"});
    // people (드래그 / ↑↓ 로 순서 변경)
    var pB=el("div",{class:"set-block"}); pB.appendChild(el("h3",{},"인원 (드래그·↑↓로 순서 변경)"));
    CFG.people.forEach(function(p,i){
      var row=el("div",{class:"frow prow"});
      var handle=el("span",{class:"drag",draggable:"true",title:"드래그해서 순서 변경","aria-hidden":"true"},"⠿");
      handle.addEventListener("dragstart",function(e){dragSrc=i;try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",String(i));}catch(_){}row.classList.add("dragging");});
      handle.addEventListener("dragend",function(){row.classList.remove("dragging");dragSrc=null;});
      row.addEventListener("dragover",function(e){if(dragSrc==null)return;e.preventDefault();try{e.dataTransfer.dropEffect="move";}catch(_){}if(dragSrc!==i)row.classList.add("dragover");});
      row.addEventListener("dragleave",function(){row.classList.remove("dragover");});
      row.addEventListener("drop",function(e){e.preventDefault();row.classList.remove("dragover");if(dragSrc==null||dragSrc===i)return;var mv=CFG.people.splice(dragSrc,1)[0];CFG.people.splice(i,0,mv);dragSrc=null;saveCfg();markTouched();render();});
      row.appendChild(handle);
      var inp=el("input",{type:"text",value:p.name}); inp.addEventListener("change",function(){p.name=inp.value;saveCfg();markTouched();if(R.name[p.id])R.name[p.id].textContent=inp.value;});
      row.appendChild(inp);
      row.appendChild(el("button",{class:"ord",title:"위로",disabled:i===0,onclick:function(){moveP(i,-1);}},"↑"));
      row.appendChild(el("button",{class:"ord",title:"아래로",disabled:i===CFG.people.length-1,onclick:function(){moveP(i,1);}},"↓"));
      if(CFG.people.length>1)row.appendChild(el("button",{class:"delp",title:"삭제",onclick:function(){deletePerson(i);}},"×"));
      pB.appendChild(row);
    });
    pB.appendChild(el("button",{class:"quickb",style:"width:100%;justify-content:center",onclick:function(){CFG.people.push({id:"p"+(CFG.seq++),name:"새 인원"});saveCfg();markTouched();render();}},"+ 인원 추가"));
    grid.appendChild(pB);
    // menus
    var mB=el("div",{class:"set-block"}); mB.appendChild(el("h3",{},"메뉴 · 가격"));
    CFG.menus.forEach(function(m){
      var row=el("div",{class:"frow"});
      row.appendChild(el("i",{class:"sw",style:"background:"+MENUCOLOR[m.id]}));
      row.appendChild(el("span",{class:"pill"},m.label));
      var inp=el("input",{type:"number",value:m.price,step:"500",min:"0"}); inp.addEventListener("change",function(){m.price=Math.max(0,parseInt(inp.value,10)||0);saveCfg();markTouched();CFG.people.forEach(function(p){updateRowTotal(p.id);});refreshSummary();refreshMobileBar();});
      row.appendChild(inp); row.appendChild(el("span",{class:"pill",style:"min-width:20px"},"원"));
      mB.appendChild(row);
    });
    mB.appendChild(el("p",{class:"hint"},"가격을 바꾸면 합계에 바로 반영돼요. (샌드위치·샐러드는 임시값이니 실제 가격으로 바꿔주세요.)"));
    grid.appendChild(mB);
    // budget
    var buB=el("div",{class:"set-block"}); buB.appendChild(el("h3",{},"월 예산 한도"));
    var brow=el("div",{class:"frow"});
    var binp=el("input",{type:"number",value:(CFG.budget&&CFG.budget.amount)||0,step:"10000",min:"0"});
    binp.addEventListener("change",function(){CFG.budget=CFG.budget||{period:"month"};CFG.budget.amount=Math.max(0,parseInt(binp.value,10)||0);saveCfg();markTouched();refreshBudget();});
    brow.appendChild(binp); brow.appendChild(el("span",{class:"pill",style:"min-width:20px"},"원"));
    buB.appendChild(brow);
    buB.appendChild(el("p",{class:"hint"},"이 달에 쓴 금액을 이 한도(기본 54만원)와 비교해 오른쪽 ‘이 달 예산’ 막대로 보여줘요."));
    grid.appendChild(buB);
    d.appendChild(grid); return d;
  }

  /* ---- toast(실행취소 지원) / theme ---- */
  var toT;
  function toast(m,undoFn){
    var t=$("toast");t.innerHTML="";t.appendChild(document.createTextNode(m));
    if(undoFn)t.appendChild(el("button",{class:"undo",onclick:function(){t.classList.remove("show");undoFn();}},"실행취소"));
    t.classList.add("show");clearTimeout(toT);toT=setTimeout(function(){t.classList.remove("show");},undoFn?5200:1900);
  }
  function applyTheme(t){if(t)document.documentElement.setAttribute("data-theme",t);else document.documentElement.removeAttribute("data-theme");}
  try{applyTheme(localStorage.getItem(LS+"theme"));}catch(e){}
  $("themeBtn").onclick=function(){var cur=document.documentElement.getAttribute("data-theme");
    var sysDark=window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches;
    var nx=cur?(cur==="dark"?"light":"dark"):(sysDark?"light":"dark");applyTheme(nx);try{localStorage.setItem(LS+"theme",nx);}catch(e){}};

  /* ---- boot ---- */
  WEEK=mondayKey(new Date());
  load();
  ONB=(!localStorage.getItem(LS+"onboarded"))&&(!localStorage.getItem(LS+"config"));
  SETOPEN=ONB;
  render();
})();
</script>
</body>
</html>
